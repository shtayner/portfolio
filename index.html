<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haifa Ben Letaifa — Portfolio</title>
<link rel="preconnect" href="https://applesocial.s3.amazonaws.com" crossorigin>
<style>
  /* SF Pro — Apple's public typeface */
  @font-face { font-family: "SF Pro Display"; font-weight: 400; font-style: normal; src: url("https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscodisplay-regular-webfont.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SF Pro Display"; font-weight: 500; font-style: normal; src: url("https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscodisplay-medium-webfont.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SF Pro Display"; font-weight: 600; font-style: normal; src: url("https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscodisplay-semibold-webfont.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SF Pro Display"; font-weight: 700; font-style: normal; src: url("https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscodisplay-bold-webfont.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SF Pro Text"; font-weight: 400; font-style: normal; src: url("https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscotext-regular-webfont.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SF Pro Text"; font-weight: 500; font-style: normal; src: url("https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscotext-medium-webfont.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SF Pro Text"; font-weight: 600; font-style: normal; src: url("https://applesocial.s3.amazonaws.com/assets/styles/fonts/sanfrancisco/sanfranciscotext-semibold-webfont.woff2") format("woff2"); font-display: swap; }

  html, body { margin: 0; padding: 0; height: auto; min-height: 100%; }
  body { font-family: "SF Pro Text", -apple-system, system-ui, sans-serif; }
  #root { min-height: 100vh; }

  /* Floating direction switcher */
  .dir-switch {
    position: fixed; z-index: 100;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px;
    padding: 5px; border-radius: 999px;
    background: rgba(28,28,30,0.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    box-shadow: 0 10px 30px -8px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.08);
    font-family: "SF Pro Text", -apple-system, system-ui, sans-serif;
  }
  .dir-switch button {
    border: 0; background: transparent; color: rgba(255,255,255,0.65);
    padding: 8px 18px; border-radius: 999px; cursor: pointer;
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    font-family: inherit;
    transition: background .2s, color .2s;
  }
  .dir-switch button.on {
    background: #fff; color: #000;
  }
  .dir-switch button:hover:not(.on) { color: #fff; }
  .dir-switch-label {
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); padding: 0 10px 0 12px;
  }
</style>
<link rel="stylesheet" href="components/portfolio.css" />
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0A84FF"/>
  <text x="200" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-8">H</text>
</svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/content.jsx"></script>
<script type="text/babel" src="components/portfolio-light.jsx"></script>
<script type="text/babel" src="components/portfolio-dark.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem("pf-lang") || "en"; } catch(e) { return "en"; }
  });
  const [dir, setDir] = useState(() => {
    try { return localStorage.getItem("pf-dir") || "light"; } catch(e) { return "light"; }
  });
  useEffect(() => { try { localStorage.setItem("pf-lang", lang); } catch(e) {} document.documentElement.lang = lang; }, [lang]);
  useEffect(() => {
    try { localStorage.setItem("pf-dir", dir); } catch(e) {}
    document.body.style.background = dir === "dark" ? "#000" : "#fff";
  }, [dir]);

  return (
    <React.Fragment>
      {dir === "light"
        ? <PortfolioLight lang={lang} setLang={setLang} />
        : <PortfolioDark lang={lang} setLang={setLang} />
      }
      <div className="dir-switch" role="group" aria-label="Design direction">
        <span className="dir-switch-label">Direction</span>
        <button className={dir === "light" ? "on" : ""} onClick={() => setDir("light")} aria-pressed={dir === "light"}>A · Light</button>
        <button className={dir === "dark" ? "on" : ""} onClick={() => setDir("dark")} aria-pressed={dir === "dark"}>B · Dark</button>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
